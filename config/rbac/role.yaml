  - statefulsets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - chuck-chuck-chuck.net
  resources:
  - littlereds
  verbs:
  - create
  - delete
  - get
  - list
  - patch
