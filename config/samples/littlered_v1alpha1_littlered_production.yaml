apiVersion: chuck-chuck-chuck.net/v1alpha1
kind: LittleRed
metadata:
  name: store-prod
spec:
  # Production: sentinel mode with HA
  mode: sentinel

  # Larger resources for production workloads
  resources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "1"
      memory: "2Gi"

  config:
    maxmemory: "1800Mi"  # ~90% of memory limit
    maxmemoryPolicy: noeviction

  # Enable authentication
  auth:
    enabled: true
    existingSecret: store-password

  # Enable Prometheus ServiceMonitor
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      labels:
        release: prometheus  # Match your Prometheus selector

  # Spread pods across nodes
  podTemplate:
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: store-prod

  # Faster failover detection
  sentinel:
    quorum: 2
    downAfterMilliseconds: 5000
    failoverTimeout: 60000
