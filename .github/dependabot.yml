version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      k8s:
        patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directories:
      - /cmd/littlered
      - /cmd/littlered-chaos-client
      # Pinned default redis_exporter sidecar image (source of truth for the
      # operator's Go defaults; embedded via //go:embed in api/v1alpha1).
      - /api/v1alpha1
    schedule:
      interval: weekly
    groups:
      golang:
        patterns:
          - "golang"

  - package-ecosystem: helm
    directory: /charts/littlered-operator
    schedule:
      interval: weekly
