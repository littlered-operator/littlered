name: Security scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  govulncheck:
    name: Go vulnerability check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          repo-checkout: false

  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Trivy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo aquasecurity/trivy --pattern '*Linux-64bit.tar.gz' --dir /tmp
          tar -xzf /tmp/*Linux-64bit.tar.gz -C /tmp trivy
          sudo mv /tmp/trivy /usr/local/bin/

      - name: Run Trivy scan
        run: trivy fs --format sarif --output trivy.sarif --severity CRITICAL,HIGH --exit-code 0 .

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif
