name: Dependabot auto-merge

# Auto-merge is controlled by a repository variable.
# To enable: go to Settings > Secrets and variables > Actions > Variables
# and set DEPENDABOT_AUTO_MERGE = true
# To disable: remove the variable or set it to any other value.
#
# Only minor and patch updates are auto-merged. Major updates always
# require manual review.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && vars.DEPENDABOT_AUTO_MERGE == 'true'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge minor and patch updates
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
          steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
