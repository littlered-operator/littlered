{{- if and .Values.metrics.enabled .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "littlered-operator.fullname" . }}-allow-metrics
  labels:
    {{- include "littlered-operator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "littlered-operator.selectorLabels" . | nindent 6 }}
      control-plane: controller-manager
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              metrics: enabled
      ports:
        - port: {{ .Values.metrics.port }}
          protocol: TCP
{{- end }}
