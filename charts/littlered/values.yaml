image:
  repository: ghcr.io/littlered-operator/littlered
  # tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

replicas: 1

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

serviceAccount:
  create: true
  name: ""

nodeSelector: {}

tolerations: []

affinity: {}

leaderElection:
  enabled: true

metrics:
  # Enable the operator metrics endpoint (HTTP on the specified port).
  # When enabled, a Service is created and --metrics-bind-address is set on the manager.
  enabled: false
  port: 8080
  serviceMonitor:
    # Create a Prometheus Operator ServiceMonitor. Requires metrics.enabled=true.
    enabled: false
    interval: "30s"
    scrapeTimeout: "10s"
    labels: {}

networkPolicy:
  # Create a NetworkPolicy restricting metrics port access to labeled namespaces.
  # Requires metrics.enabled=true.
  enabled: false

podDisruptionBudget:
  # Controls the PodDisruptionBudget for the OPERATOR Deployment itself only.
  # PDBs for managed LittleRed instances are a separate concern, controlled per-CR
  # via spec.podDisruptionBudget (created by default; set create: false to opt out).
  #
  # A PDB is only rendered when create is true AND replicas > 1: over a single
  # operator pod a PDB is counter-productive (it can only block node drains, never
  # protect availability), so it is suppressed regardless of create.
  create: false
  # Set one of maxUnavailable / minAvailable (mutually exclusive).
  # minAvailable takes precedence when set.
  maxUnavailable: 1
  # minAvailable: 1
