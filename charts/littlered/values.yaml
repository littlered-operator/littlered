image:
  repository: ghcr.io/littlered-operator/littlered
  # tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

replicas: 1

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

serviceAccount:
  create: true
  name: ""

nodeSelector: {}

tolerations: []

affinity: {}

leaderElection:
  enabled: true

metrics:
  # Enable the operator metrics endpoint (HTTP on the specified port).
  # When enabled, a Service is created and --metrics-bind-address is set on the manager.
  enabled: false
  port: 8080
  serviceMonitor:
    # Create a Prometheus Operator ServiceMonitor. Requires metrics.enabled=true.
    enabled: false
    interval: "30s"
    scrapeTimeout: "10s"
    labels: {}

networkPolicy:
  # Create a NetworkPolicy restricting metrics port access to labeled namespaces.
  # Requires metrics.enabled=true.
  enabled: false

podDisruptionBudget:
  # Creates a PodDisruptionBudget for the operator deployment itself.
  # PDBs for managed LittleRed instances are controlled per-CR via
  # spec.podDisruptionBudget (created by default; set create: false to opt out).
  create: false
  maxUnavailable: 1
