image:
  repository: ghcr.io/littlered-operator/littlered
  # tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

replicas: 1

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

serviceAccount:
  create: true
  name: ""

nodeSelector: {}

tolerations: []

affinity: {}

# Log level for the operator. Accepts: debug, info, error, or an integer (0=info, 1=debug).
logLevel: info

leaderElection:
  enabled: true

metrics:
  # Enable the operator metrics endpoint (HTTP on the specified port).
  # When enabled, a Service is created and --metrics-bind-address is set on the manager.
  enabled: false
  port: 8080
  serviceMonitor:
    # Create a Prometheus Operator ServiceMonitor. Requires metrics.enabled=true.
    enabled: false
    interval: "30s"
    scrapeTimeout: "10s"
    labels: {}

networkPolicy:
  # Create a NetworkPolicy restricting metrics port access to labeled namespaces.
  # Requires metrics.enabled=true.
  enabled: false

podDisruptionBudget:
  # When enabled, creates a PDB for the operator deployment and enables PDB creation
  # by default for all managed LittleRed instances.
  create: false
  maxUnavailable: 1
