apiVersion: v1
kind: Pod
metadata:
  name: {{ .Values.sentinel.name }}-chaos-client
  labels:
    app: chaos-client
    test: manual-investigation
spec:
  restartPolicy: Never
  initContainers:
  - name: wait-for-sentinel
    image: valkey/valkey:8.0
    command: 
    - "sh"
    - "-c"
    - "until valkey-cli -h {{ .Values.sentinel.name }} -p 26379 sentinel masters | grep -q 'name'; do echo waiting for sentinel to track masters; sleep 2; done;"
  containers:
  - name: chaos-client
    image: {{ .Values.chaosClient.image.repository }}:{{ .Values.chaosClient.image.tag }}
    imagePullPolicy: {{ .Values.chaosClient.image.pullPolicy }}
    args:
    - "-addrs={{ .Values.sentinel.name }}:6379"
    - "-prefix={{ .Values.chaosClient.keyPrefix }}"
    - "-duration={{ .Values.chaosClient.duration }}"
    - "-write-rate={{ .Values.chaosClient.writeRate }}"
    - "-timeout={{ .Values.chaosClient.timeout }}"
    - "-status-interval=5s"
