# Cluster configuration
cluster:
  name: manual-chaos-cluster
  shards: 3
  replicasPerShard: 1
  nodeTimeout: 15000

# Chaos Client configuration
chaosClient:
  image:
    repository: ghcr.io/littlered-operator/littlered-chaos-client
    tag: latest
    pullPolicy: Always
  # 0 means unlimited duration
  duration: 0
  writeRate: 100ms
  timeout: 500ms
  keyPrefix: cluster-chaos
